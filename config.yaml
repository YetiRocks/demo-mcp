name: "MCP Demo"
app_id: "demo-mcp"
version: "1.0.0"
description: "Interactive Model Context Protocol (MCP) client — search tables via JSON-RPC 2.0"
enabled: true
rest: true
mcp: true

audit:
  protocol:
    mcp: true

schemas:
  - schemas/mcp.graphql

dataLoader: data/*.json

static_files:
  path: web
  route: /
  index: index.html
  notFound:
    file: index.html
    statusCode: 200
  build:
    sourceDir: source
    command: npm run build